    category: Operations
    severity: High
    applies_to_profiles: [enterprise, finance-sox, ai-enabled, production-critical]
    decision: Conditional
    requires_approval_from: [DevOps, Enterprise Architecture]
    score_impact: {Operations: -20}
    remediation: [Add deployment guide or deployment automation evidence]

